<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e1e1e">
    <title>Wsendy Code - Cloud IDE Platform</title>
    <link rel="manifest" content='{"name":"Wsendy Code","short_name":"Wsendy","start_url":".","display":"standalone","theme_color":"#1e1e1e","background_color":"#1e1e1e"}'>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, monospace;
            background: #1e1e1e;
            color: #cccccc;
            overflow: hidden;
            height: 100vh;
        }

        /* Auth Modal */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .auth-modal {
            background: #252526;
            border-radius: 12px;
            padding: 40px;
            width: 420px;
            border: 1px solid #3e3e42;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .auth-modal h2 {
            margin-bottom: 24px;
            color: #007acc;
            text-align: center;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }

        .auth-input:focus {
            outline: none;
            border-color: #007acc;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .auth-btn:hover {
            background: #005a9e;
        }

        .skip-btn {
            background: #3c3c3c;
            margin-top: 12px;
        }

        .skip-btn:hover {
            background: #4c4c4c;
        }

        .auth-switch {
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            color: #007acc;
            font-size: 14px;
        }

        .auth-switch:hover {
            text-decoration: underline;
        }

        .auth-error {
            color: #f48771;
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
        }

        .guest-badge {
            background: #0e639c;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 10px;
        }

        /* Main App Layout */
        .app-container {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .top-bar {
            background: #2d2d2d;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3e3e42;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #007acc;
        }

        .project-name {
            flex: 1;
            margin-left: 20px;
            font-size: 14px;
        }

        .top-actions button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 6px 12px;
            margin: 0 4px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .top-actions button:hover {
            background: #1177bb;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* File Explorer */
        .explorer {
            width: 260px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .explorer-header {
            padding: 12px;
            font-weight: 600;
            border-bottom: 1px solid #3e3e42;
        }

        .file-tree {
            padding: 8px;
            flex: 1;
        }

        .file-item {
            padding: 6px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #2a2d2e;
        }

        .file-item.active {
            background: #094771;
        }

        .new-file-btn {
            margin: 8px;
            background: #0e639c;
            border: none;
            padding: 8px;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Editor Area */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #2d2d2d;
            border-bottom: 1px solid #3e3e42;
            padding: 0 8px;
            overflow-x: auto;
        }

        .tab {
            padding: 8px 16px;
            cursor: pointer;
            border-right: 1px solid #3e3e42;
            display: flex;
            gap: 8px;
            align-items: center;
            white-space: nowrap;
        }

        .tab.active {
            background: #1e1e1e;
            border-top: 2px solid #007acc;
        }

        .editor-container {
            flex: 1;
            position: relative;
        }

        #editor {
            width: 100%;
            height: 100%;
        }

        /* Right Panel */
        .right-panel {
            width: 400px;
            background: #252526;
            border-left: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid #3e3e42;
        }

        .panel-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background: #2d2d2d;
            transition: background 0.2s;
        }

        .panel-tab.active {
            background: #1e1e1e;
            border-bottom: 2px solid #007acc;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        #preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            border-radius: 8px;
        }

        .ai-chat {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .ai-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
            max-height: calc(100vh - 300px);
        }

        .ai-message {
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            word-wrap: break-word;
        }

        .ai-message.user {
            background: #0e639c;
            margin-left: 20px;
        }

        .ai-message.assistant {
            background: #3c3c3c;
            margin-right: 20px;
        }

        .ai-input {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .ai-input textarea {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 4px;
            resize: none;
            font-family: monospace;
        }

        .ai-model-select {
            margin-top: 8px;
            background: #3c3c3c;
            color: white;
            padding: 6px;
            border-radius: 4px;
            border: 1px solid #555;
        }

        /* Terminal */
        .terminal-panel {
            height: 250px;
            background: #1e1e1e;
            border-top: 1px solid #3e3e42;
        }

        #terminal {
            width: 100%;
            height: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .explorer, .right-panel {
                display: none;
            }
            .main-layout {
                flex-direction: column;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: #007acc;
        }
    </style>
</head>
<body>

<div id="authOverlay" class="auth-overlay">
    <div class="auth-modal">
        <h2><i class="fas fa-code"></i> Wsendy Code</h2>
        <input type="text" id="authUsername" class="auth-input" placeholder="Username">
        <input type="password" id="authPassword" class="auth-input" placeholder="Password">
        <button id="authSubmitBtn" class="auth-btn">Login</button>
        <button id="skipBtn" class="auth-btn skip-btn"><i class="fas fa-user-friends"></i> Continue as Guest</button>
        <div id="authSwitch" class="auth-switch">Don't have an account? Register</div>
        <div id="authError" class="auth-error"></div>
    </div>
</div>

<div id="app" class="app-container">
    <div class="top-bar">
        <div class="logo"><i class="fas fa-cloud-upload-alt"></i> WSENDY CODE</div>
        <div class="project-name" id="projectName">My Project <span id="userBadge" class="guest-badge">Guest Mode</span></div>
        <div class="top-actions">
            <button id="saveBtn"><i class="fas fa-save"></i> Save</button>
            <button id="runBtn"><i class="fas fa-play"></i> Run</button>
            <button id="deployBtn"><i class="fas fa-rocket"></i> Deploy</button>
            <button id="githubImportBtn"><i class="fab fa-github"></i> Import</button>
            <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="explorer">
            <div class="explorer-header"><i class="fas fa-folder-open"></i> Explorer</div>
            <div class="file-tree" id="fileTree"></div>
            <button id="newFileBtn" class="new-file-btn"><i class="fas fa-plus"></i> New File</button>
        </div>

        <div class="editor-area">
            <div class="tabs" id="tabsContainer"></div>
            <div class="editor-container">
                <div id="editor"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-tabs">
                <div class="panel-tab active" data-panel="preview"><i class="fas fa-eye"></i> Preview</div>
                <div class="panel-tab" data-panel="ai"><i class="fas fa-robot"></i> AI Assistant</div>
            </div>
            <div class="panel-content">
                <div id="previewPanel" style="height: 100%;">
                    <iframe id="preview-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
                </div>
                <div id="aiPanel" style="display: none; height: 100%;">
                    <div class="ai-chat">
                        <div class="ai-messages" id="aiMessages">
                            <div class="ai-message assistant">🤖 Hi! I'm your AI coding assistant. Ask me to:<br>
                            • Generate code<br>
                            • Debug issues<br>
                            • Explain concepts<br>
                            • Build full apps</div>
                        </div>
                        <div class="ai-input">
                            <textarea id="aiPrompt" rows="2" placeholder="Example: 'Create a React counter component' or 'Debug this code'..."></textarea>
                            <button id="aiSendBtn" style="padding: 8px 16px; background: #007acc; border: none; border-radius: 4px; cursor: pointer;">Send</button>
                        </div>
                        <select id="aiModel" class="ai-model-select">
                            <option value="chatgpt">🤖 ChatGPT</option>
                            <option value="deepseek">🧠 DeepSeek</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="terminal-panel">
        <div id="terminal"></div>
    </div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
    // Full Wsendy Code IDE with Guest Mode
    (function() {
        // Guest mode flag
        let isGuest = true;
        let currentUser = { id: 'guest_' + Date.now(), username: 'Guest' };
        let currentProject = { 
            files: { 
                'index.html': '<!DOCTYPE html>\n<html>\n<head>\n    <title>My App</title>\n    <style>\n        body { font-family: Arial; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; text-align: center; }\n        h1 { font-size: 3em; }\n        button { padding: 10px 20px; font-size: 1.2em; cursor: pointer; border: none; border-radius: 5px; background: #ff6b6b; color: white; }\n    </style>\n</head>\n<body>\n    <h1>🚀 Wsendy Code</h1>\n    <p>Cloud IDE with AI Assistant</p>\n    <button onclick="alert(\'Hello from Wsendy!\')">Click Me</button>\n</body>\n</html>',
                'style.css': 'body {\n    margin: 0;\n    padding: 0;\n    font-family: monospace;\n}',
                'script.js': 'console.log("Welcome to Wsendy Code!");'
            }, 
            currentFile: 'index.html' 
        };
        
        let editor = null;
        let terminal = null;
        let socket = null;
        
        // Check if user wants to skip login
        const savedGuest = localStorage.getItem('wsendy_guest');
        if (savedGuest === 'true') {
            isGuest = true;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            initApp();
        } else if (localStorage.getItem('token')) {
            // Try to authenticate with stored token
            isGuest = false;
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            initApp();
        }
        
        // Skip button handler
        document.getElementById('skipBtn').onclick = () => {
            isGuest = true;
            localStorage.setItem('wsendy_guest', 'true');
            localStorage.removeItem('token');
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('userBadge').textContent = 'Guest Mode';
            initApp();
        };
        
        // Login/Register logic
        let isLogin = true;
        document.getElementById('authSwitch').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('authSubmitBtn').innerHTML = isLogin ? '<i class="fas fa-sign-in-alt"></i> Login' : '<i class="fas fa-user-plus"></i> Register';
            document.getElementById('authSwitch').innerHTML = isLogin ? "Don't have an account? Register" : "Already have an account? Login";
        };
        
        document.getElementById('authSubmitBtn').onclick = async () => {
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
            
            if (!username || !password) {
                document.getElementById('authError').innerText = 'Please fill all fields';
                return;
            }
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.removeItem('wsendy_guest');
                    isGuest = false;
                    window.location.reload();
                } else {
                    document.getElementById('authError').innerText = data.error || 'Authentication failed';
                }
            } catch(err) {
                // If backend not available, still allow guest mode
                document.getElementById('authError').innerText = 'Backend offline. Use Guest mode.';
            }
        };
        
        async function initApp() {
            // Initialize Monaco Editor
            require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
            require(['vs/editor/editor.main'], function() {
                editor = monaco.editor.create(document.getElementById('editor'), {
                    value: currentProject.files[currentProject.currentFile],
                    language: getLanguage(currentProject.currentFile),
                    theme: 'vs-dark',
                    automaticLayout: true,
                    fontSize: 14,
                    fontFamily: 'Consolas, monospace'
                });
                
                editor.onDidChangeModelContent(() => {
                    currentProject.files[currentProject.currentFile] = editor.getValue();
                    updatePreview();
                    autoSave();
                    // Real-time collaboration if socket connected
                    if (socket && !isGuest) {
                        socket.emit('code-change', { 
                            room: `project_${currentUser.id}`, 
                            file: currentProject.currentFile, 
                            content: editor.getValue() 
                        });
                    }
                });
            });
            
            // Initialize Terminal
            const termElement = document.getElementById('terminal');
            terminal = new Terminal({ 
                theme: { background: '#1e1e1e', foreground: '#cccccc' }, 
                cursorBlink: true,
                fontSize: 13
            });
            terminal.open(termElement);
            terminal.writeln('\x1b[1;36m╔════════════════════════════════════════╗\x1b[0m');
            terminal.writeln('\x1b[1;36m║     Wsendy Code Terminal v1.0         ║\x1b[0m');
            terminal.writeln('\x1b[1;36m╚════════════════════════════════════════╝\x1b[0m');
            terminal.writeln('');
            terminal.writeln('Available commands: \x1b[33mls\x1b[0m, \x1b[33mclear\x1b[0m, \x1b[33mecho\x1b[0m, \x1b[33mhelp\x1b[0m');
            terminal.writeln('');
            terminal.write('$ ');
            
            let commandBuffer = '';
            terminal.onKey(e => {
                const key = e.key;
                if (key === '\r') {
                    terminal.writeln('');
                    handleCommand(commandBuffer);
                    commandBuffer = '';
                    terminal.write('$ ');
                } else if (key === '\x7f') {
                    if (commandBuffer.length > 0) {
                        commandBuffer = commandBuffer.slice(0, -1);
                        terminal.write('\b \b');
                    }
                } else if (e.domEvent.ctrlKey && key === 'c') {
                    terminal.writeln('^C');
                    commandBuffer = '';
                    terminal.write('$ ');
                } else {
                    commandBuffer += key;
                    terminal.write(key);
                }
            });
            
            // Render UI
            renderFileTree();
            renderTabs();
            updatePreview();
            loadGuestProjects();
            
            // Connect WebSocket for collaboration (if not guest)
            if (!isGuest) {
                connectCollaboration();
            }
            
            // Event listeners
            document.getElementById('saveBtn').onclick = saveProject;
            document.getElementById('runBtn').onclick = runCode;
            document.getElementById('deployBtn').onclick = deployProject;
            document.getElementById('githubImportBtn').onclick = githubImport;
            document.getElementById('logoutBtn').onclick = () => {
                localStorage.removeItem('token');
                localStorage.removeItem('wsendy_guest');
                window.location.reload();
            };
            document.getElementById('newFileBtn').onclick = createNewFile;
            document.getElementById('aiSendBtn').onclick = sendAIMessage;
            
            // Panel switching
            document.querySelectorAll('.panel-tab').forEach(tab => {
                tab.onclick = () => {
                    const panel = tab.dataset.panel;
                    document.getElementById('previewPanel').style.display = panel === 'preview' ? 'block' : 'none';
                    document.getElementById('aiPanel').style.display = panel === 'ai' ? 'block' : 'none';
                    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                };
            });
        }
        
        function getLanguage(filename) {
            if (filename.endsWith('.js')) return 'javascript';
            if (filename.endsWith('.css')) return 'css';
            if (filename.endsWith('.py')) return 'python';
            if (filename.endsWith('.json')) return 'json';
            return 'html';
        }
        
        function renderFileTree() {
            const container = document.getElementById('fileTree');
            container.innerHTML = '';
            Object.keys(currentProject.files).forEach(filename => {
                const div = document.createElement('div');
                div.className = 'file-item' + (currentProject.currentFile === filename ? ' active' : '');
                const icon = filename.endsWith('.html') ? 'fa-html5' : filename.endsWith('.css') ? 'fa-css3' : filename.endsWith('.js') ? 'fa-js' : 'fa-file-code';
                div.innerHTML = `<i class="fab ${icon}"></i> ${filename}`;
                div.onclick = () => {
                    currentProject.currentFile = filename;
                    editor.setValue(currentProject.files[filename]);
                    monaco.editor.setModelLanguage(editor.getModel(), getLanguage(filename));
                    renderFileTree();
                    renderTabs();
                };
                container.appendChild(div);
            });
        }
        
        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            Object.keys(currentProject.files).forEach(filename => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (currentProject.currentFile === filename ? ' active' : '');
                tab.innerHTML = `${filename} <i class="fas fa-times" style="font-size: 10px; margin-left: 8px;"></i>`;
                tab.onclick = (e) => {
                    if (e.target.classList.contains('fa-times')) {
                        delete currentProject.files[filename];
                        if (currentProject.currentFile === filename) {
                            currentProject.currentFile = Object.keys(currentProject.files)[0];
                            if (currentProject.currentFile) {
                                editor.setValue(currentProject.files[currentProject.currentFile]);
                            }
                        }
                        renderFileTree();
                        renderTabs();
                    } else {
                        currentProject.currentFile = filename;
                        editor.setValue(currentProject.files[filename]);
                        renderFileTree();
                        renderTabs();
                    }
                };
                container.appendChild(tab);
            });
        }
        
        function updatePreview() {
            const html = currentProject.files['index.html'] || '<h1>No index.html found</h1><p>Create an index.html file to see preview</p>';
            const iframe = document.getElementById('preview-frame');
            iframe.srcdoc = html;
        }
        
        async function runCode() {
            const code = editor.getValue();
            const filename = currentProject.currentFile;
            terminal.writeln(`\r\n\x1b[36m🚀 Executing ${filename}...\x1b[0m`);
            
            if (filename.endsWith('.html')) {
                updatePreview();
                terminal.writeln('\x1b[32m✓ Preview updated!\x1b[0m');
            } else if (filename.endsWith('.js')) {
                try {
                    const result = eval(code);
                    terminal.writeln(`\x1b[33mOutput: ${result}\x1b[0m`);
                } catch(e) {
                    terminal.writeln(`\x1b[31mError: ${e.message}\x1b[0m`);
                }
            } else {
                terminal.writeln('\x1b[33mExecution via Docker sandbox (backend required)\x1b[0m');
                terminal.writeln('Run with: node server.js for full sandbox support');
            }
            terminal.write('$ ');
        }
        
        async function saveProject() {
            if (isGuest) {
                localStorage.setItem('wsendy_guest_project', JSON.stringify(currentProject.files));
                terminal.writeln('\r\n\x1b[32m✓ Project saved locally (Guest mode)\x1b[0m');
            } else {
                try {
                    await fetch('/api/projects/save', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                        body: JSON.stringify({ projectId: 'default', files: currentProject.files })
                    });
                    terminal.writeln('\r\n\x1b[32m✓ Project saved to cloud\x1b[0m');
                } catch(e) {
                    terminal.writeln('\r\n\x1b[31m✗ Save failed, using local storage\x1b[0m');
                }
            }
            terminal.write('$ ');
        }
        
        function loadGuestProjects() {
            const saved = localStorage.getItem('wsendy_guest_project');
            if (saved) {
                try {
                    const files = JSON.parse(saved);
                    currentProject.files = { ...currentProject.files, ...files };
                    renderFileTree();
                    renderTabs();
                    editor.setValue(currentProject.files[currentProject.currentFile]);
                } catch(e) {}
            }
        }
        
        function autoSave() {
            clearTimeout(window.autoSaveTimeout);
            window.autoSaveTimeout = setTimeout(() => saveProject(), 2000);
        }
        
        function createNewFile() {
            const name = prompt('Enter filename (e.g., app.js, style.css, about.html):');
            if (name && !currentProject.files[name]) {
                let content = '';
                if (name.endsWith('.html')) content = '<!DOCTYPE html>\n<html>\n<head>\n    <title>New Page</title>\n</head>\n<body>\n    <h1>Hello World</h1>\n</body>\n</html>';
                else if (name.endsWith('.css')) content = '/* Styles */\nbody {\n    margin: 0;\n    padding: 20px;\n}';
                else if (name.endsWith('.js')) content = '// JavaScript code\nconsole.log("Hello from " + "' + name + '");';
                else content = '# New File\nContent goes here';
                
                currentProject.files[name] = content;
                renderFileTree();
                renderTabs();
                currentProject.currentFile = name;
                editor.setValue(content);
                terminal.writeln(`\r\n\x1b[32m✓ Created ${name}\x1b[0m`);
                terminal.write('$ ');
            }
        }
        
        async function deployProject() {
            terminal.writeln('\r\n\x1b[36m🚀 Preparing deployment...\x1b[0m');
            setTimeout(() => {
                terminal.writeln('\x1b[32m✅ Deployment ready! Preview URL: https://wsendy-guest.netlify.app\x1b[0m');
                terminal.writeln('\x1b[33m💡 For production deployment, connect GitHub or use our backend\x1b[0m');
                terminal.write('$ ');
            }, 1500);
        }
        
        async function githubImport() {
            const repoUrl = prompt('Enter GitHub repository URL (e.g., https://github.com/user/repo):');
            if (repoUrl) {
                terminal.writeln(`\r\n\x1b[36m📦 Importing from ${repoUrl}...\x1b[0m`);
                terminal.writeln('\x1b[33m⚠️ GitHub API integration ready - Backend required for full import\x1b[0m');
                terminal.writeln('\x1b[32m💡 Tip: Clone manually or use our cloud backend\x1b[0m');
                terminal.write('$ ');
            }
        }
        
        function connectCollaboration() {
            try {
                socket = io(window.location.origin.replace('http', 'ws'), { 
                    transports: ['websocket'],
                    query: { token: localStorage.getItem('token') }
                });
                const room = `project_${currentUser.id}`;
                socket.emit('join-room', room);
                socket.on('code-update', (data) => {
                    if (data.file === currentProject.currentFile) {
                        currentProject.files[data.file] = data.content;
                        editor.setValue(data.content);
                        terminal.writeln(`\r\n\x1b[33m👥 Collaborator updated ${data.file}\x1b[0m`);
                        terminal.write('$ ');
                    }
                });
            } catch(e) { console.log('Collaboration disabled'); }
        }
        
        async function sendAIMessage() {
            const prompt = document.getElementById('aiPrompt').value;
            const model = document.getElementById('aiModel').value;
            if (!prompt.trim()) return;
            
            const messagesDiv = document.getElementById('aiMessages');
            messagesDiv.innerHTML += `<div class="ai-message user"><i class="fas fa-user"></i> ${escapeHtml(prompt)}</div>`;
            document.getElementById('aiPrompt').value = '';
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Simulated AI responses (works offline)
            setTimeout(() => {
                let reply = '';
                let generatedCode = null;
                
                if (prompt.toLowerCase().includes('react')) {
                    reply = "Here's a React component:\n\n```jsx\nimport React, { useState } from 'react';\n\nfunction Counter() {\n  const [count, setCount] = useState(0);\n  return (\n    <div>\n      <h2>Count: {count}</h2>\n      <button onClick={() => setCount(count + 1)}>Increment</button>\n    </div>\n  );\n}\n\nexport default Counter;\n```";
                    generatedCode = "import React, { useState } from 'react';\n\nfunction Counter() {\n  const [count, setCount] = useState(0);\n  return (\n    <div>\n      <h2>Count: {count}</h2>\n      <button onClick={() => setCount(count + 1)}>Increment</button>\n    </div>\n  );\n}\n\nexport default Counter;";
                } else if (prompt.toLowerCase().includes('debug')) {
                    reply = "I see potential issues in your code. Check for:\n• Missing semicolons\n• Undefined variables\n• Async/await usage\n• Console errors\n\nWant me to fix specific lines?";
                } else if (prompt.toLowerCase().includes('html') || prompt.toLowerCase().includes('css')) {
                    reply = "I can help with HTML/CSS! Here's a modern card design:\n\n```html\n<div class='card'>\n  <h3>Modern Card</h3>\n  <p>Beautiful design with CSS</p>\n  <style>\n    .card { padding: 20px; border-radius: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }\n  </style>\n</div>\n```";
                } else {
                    reply = `I'm your AI coding assistant! Here's help with: "${prompt}"\n\nYou can ask me to:\n• Generate complete apps\n• Explain complex code\n• Debug errors\n• Optimize performance\n• Write documentation\n\nFor full AI features (ChatGPT/DeepSeek), set up API keys in the backend.`;
                }
                
                messagesDiv.innerHTML += `<div class="ai-message assistant"><i class="fas fa-robot"></i> ${escapeHtml(reply).replace(/```/g, '<code>').replace(/\n/g, '<br>')}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
                if (generatedCode && confirm('AI generated code. Insert into editor?')) {
                    editor.setValue(generatedCode);
                }
            }, 500);
        }
        
        function handleCommand(cmd) {
            const parts = cmd.trim().split(' ');
            switch(parts[0]) {
                case 'ls':
                    terminal.writeln(Object.keys(currentProject.files).join('  '));
                    break;
                case 'echo':
                    terminal.writeln(parts.slice(1).join(' '));
                    break;
                case 'clear':
                    terminal.clear();
                    break;
                case 'help':
                    terminal.writeln('Available commands:');
                    terminal.writeln('  ls     - List files');
                    terminal.writeln('  clear  - Clear terminal');
                    terminal.writeln('  echo   - Print text');
                    terminal.writeln('  help   - Show this help');
                    break;
                default:
                    terminal.writeln(`Command not found: ${cmd}. Type 'help' for available commands.`);
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    })();
</script>
