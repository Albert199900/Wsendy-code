<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1e1e1e">
    <title>Wsendy Code - Cloud IDE Platform</title>
    <link rel="manifest" href="manifest.json">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Monaco Editor CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, monospace;
            background: #1e1e1e;
            color: #cccccc;
            overflow: hidden;
            height: 100vh;
        }

        /* Auth Modal */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .auth-modal {
            background: #252526;
            border-radius: 12px;
            padding: 40px;
            width: 400px;
            border: 1px solid #3e3e42;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .auth-modal h2 {
            margin-bottom: 24px;
            color: #007acc;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #007acc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
        }

        .auth-switch {
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            color: #007acc;
        }

        /* Main App Layout */
        .app-container {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .top-bar {
            background: #2d2d2d;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #3e3e42;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #007acc;
        }

        .project-name {
            flex: 1;
            margin-left: 20px;
            font-size: 14px;
        }

        .top-actions button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 6px 12px;
            margin: 0 4px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* File Explorer */
        .explorer {
            width: 260px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .explorer-header {
            padding: 12px;
            font-weight: 600;
            border-bottom: 1px solid #3e3e42;
        }

        .file-tree {
            padding: 8px;
        }

        .file-item {
            padding: 6px 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 4px;
        }

        .file-item:hover {
            background: #2a2d2e;
        }

        .file-item.active {
            background: #094771;
        }

        /* Editor Area */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: #2d2d2d;
            border-bottom: 1px solid #3e3e42;
            padding: 0 8px;
        }

        .tab {
            padding: 8px 16px;
            cursor: pointer;
            border-right: 1px solid #3e3e42;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tab.active {
            background: #1e1e1e;
            border-top: 2px solid #007acc;
        }

        .editor-container {
            flex: 1;
            position: relative;
        }

        #editor {
            width: 100%;
            height: 100%;
        }

        /* Right Panel */
        .right-panel {
            width: 400px;
            background: #252526;
            border-left: 1px solid #3e3e42;
            display: flex;
            flex-direction: column;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid #3e3e42;
        }

        .panel-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background: #2d2d2d;
        }

        .panel-tab.active {
            background: #1e1e1e;
            border-bottom: 2px solid #007acc;
        }

        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        #preview-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .ai-chat {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .ai-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .ai-message {
            padding: 8px;
            margin: 8px 0;
            border-radius: 6px;
        }

        .ai-message.user {
            background: #0e639c;
        }

        .ai-message.assistant {
            background: #3c3c3c;
        }

        .ai-input {
            display: flex;
            gap: 8px;
        }

        .ai-input textarea {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 4px;
            resize: none;
        }

        /* Terminal */
        .terminal-panel {
            height: 250px;
            background: #1e1e1e;
            border-top: 1px solid #3e3e42;
        }

        #terminal {
            width: 100%;
            height: 100%;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .explorer, .right-panel {
                display: none;
            }
            .main-layout {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div id="authOverlay" class="auth-overlay">
    <div class="auth-modal">
        <h2 id="authTitle">Login to Wsendy Code</h2>
        <input type="text" id="authUsername" class="auth-input" placeholder="Username">
        <input type="password" id="authPassword" class="auth-input" placeholder="Password">
        <button id="authSubmitBtn" class="auth-btn">Login</button>
        <div id="authSwitch" class="auth-switch">Don't have an account? Register</div>
        <div id="authError" style="color: #f48771; margin-top: 12px;"></div>
    </div>
</div>

<div id="app" class="app-container">
    <div class="top-bar">
        <div class="logo">WSENDY CODE</div>
        <div class="project-name">My Project</div>
        <div class="top-actions">
            <button id="saveBtn"><i class="fas fa-save"></i> Save</button>
            <button id="runBtn"><i class="fas fa-play"></i> Run</button>
            <button id="deployBtn"><i class="fas fa-rocket"></i> Deploy</button>
            <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="explorer">
            <div class="explorer-header">Explorer</div>
            <div class="file-tree" id="fileTree"></div>
            <button id="newFileBtn" style="margin: 8px; background: #0e639c; border: none; padding: 4px;">+ New File</button>
        </div>

        <div class="editor-area">
            <div class="tabs" id="tabsContainer"></div>
            <div class="editor-container">
                <div id="editor"></div>
            </div>
        </div>

        <div class="right-panel">
            <div class="panel-tabs">
                <div class="panel-tab active" data-panel="preview">Preview</div>
                <div class="panel-tab" data-panel="ai">AI Assistant</div>
            </div>
            <div class="panel-content">
                <div id="previewPanel" style="height: 100%;">
                    <iframe id="preview-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
                </div>
                <div id="aiPanel" style="display: none; height: 100%;">
                    <div class="ai-chat">
                        <div class="ai-messages" id="aiMessages">
                            <div class="ai-message assistant">👋 I'm your AI assistant. Ask me to write, debug, or explain code!</div>
                        </div>
                        <div class="ai-input">
                            <textarea id="aiPrompt" rows="2" placeholder="Generate code, debug, or ask anything..."></textarea>
                            <button id="aiSendBtn" style="padding: 8px 16px;">Send</button>
                        </div>
                        <select id="aiModel" style="margin-top: 8px; background: #3c3c3c; color: white;">
                            <option value="chatgpt">ChatGPT</option>
                            <option value="deepseek">DeepSeek</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="terminal-panel">
        <div id="terminal"></div>
    </div>
</div>

<!-- External Libraries -->
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jwt-decode@3.1.2/build/jwt-decode.min.js"></script>

<script>
    // Complete Frontend Application
    (function() {
        // Configuration
        const API_URL = window.location.origin;
        const WS_URL = window.location.origin.replace('http', 'ws');
        
        let currentUser = null;
        let currentProject = { files: { 'index.html': '<h1>Hello Wsendy Code!</h1>' }, currentFile: 'index.html' };
        let editor = null;
        let terminal = null;
        let socket = null;
        let collaborationRoom = null;

        // Auth Check
        const token = localStorage.getItem('token');
        if (token) {
            try {
                const decoded = jwt_decode(token);
                if (decoded.exp * 1000 > Date.now()) {
                    currentUser = decoded;
                    document.getElementById('authOverlay').style.display = 'none';
                    document.getElementById('app').style.display = 'flex';
                    initApp();
                } else {
                    localStorage.removeItem('token');
                }
            } catch(e) { localStorage.removeItem('token'); }
        }

        // Auth Logic
        let isLogin = true;
        document.getElementById('authSwitch').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('authTitle').innerText = isLogin ? 'Login to Wsendy Code' : 'Register for Wsendy Code';
            document.getElementById('authSubmitBtn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('authSwitch').innerText = isLogin ? "Don't have an account? Register" : "Already have an account? Login";
        };

        document.getElementById('authSubmitBtn').onclick = async () => {
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.reload();
                } else {
                    document.getElementById('authError').innerText = data.error || 'Authentication failed';
                }
            } catch(err) {
                document.getElementById('authError').innerText = 'Network error';
            }
        };

        async function initApp() {
            // Load Monaco Editor
            require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
            require(['vs/editor/editor.main'], function() {
                editor = monaco.editor.create(document.getElementById('editor'), {
                    value: currentProject.files[currentProject.currentFile],
                    language: 'html',
                    theme: 'vs-dark',
                    automaticLayout: true
                });
                
                editor.onDidChangeModelContent(() => {
                    currentProject.files[currentProject.currentFile] = editor.getValue();
                    updatePreview();
                    autoSave();
                    // Collaboration send
                    if (socket && collaborationRoom) {
                        socket.emit('code-change', { room: collaborationRoom, file: currentProject.currentFile, content: editor.getValue() });
                    }
                });
            });

            // Terminal
            const termElement = document.getElementById('terminal');
            terminal = new Terminal({ theme: { background: '#1e1e1e' }, cursorBlink: true });
            terminal.open(termElement);
            terminal.writeln('Wsendy Code Terminal v1.0');
            terminal.write('$ ');
            
            let commandBuffer = '';
            terminal.onKey(e => {
                const ev = e.domEvent;
                const key = e.key;
                if (key === '\r') {
                    terminal.writeln('');
                    handleCommand(commandBuffer);
                    commandBuffer = '';
                    terminal.write('$ ');
                } else if (key === '\x7f') {
                    if (commandBuffer.length > 0) {
                        commandBuffer = commandBuffer.slice(0, -1);
                        terminal.write('\b \b');
                    }
                } else {
                    commandBuffer += key;
                    terminal.write(key);
                }
            });

            // File Tree
            renderFileTree();
            
            // Tabs
            renderTabs();
            
            // Preview
            updatePreview();
            
            // WebSocket Collaboration
            connectCollaboration();
            
            // Load user projects
            await loadProjects();
            
            // Event Listeners
            document.getElementById('saveBtn').onclick = saveProject;
            document.getElementById('runBtn').onclick = runCode;
            document.getElementById('deployBtn').onclick = deployProject;
            document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('token'); window.location.reload(); };
            document.getElementById('newFileBtn').onclick = createNewFile;
            document.getElementById('aiSendBtn').onclick = sendAIMessage;
            
            // Panel switching
            document.querySelectorAll('.panel-tab').forEach(tab => {
                tab.onclick = () => {
                    const panel = tab.dataset.panel;
                    document.getElementById('previewPanel').style.display = panel === 'preview' ? 'block' : 'none';
                    document.getElementById('aiPanel').style.display = panel === 'ai' ? 'block' : 'none';
                    document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                };
            });
        }

        function renderFileTree() {
            const container = document.getElementById('fileTree');
            container.innerHTML = '';
            Object.keys(currentProject.files).forEach(filename => {
                const div = document.createElement('div');
                div.className = 'file-item' + (currentProject.currentFile === filename ? ' active' : '');
                div.innerHTML = `<i class="fas fa-file-code"></i> ${filename}`;
                div.onclick = () => {
                    currentProject.currentFile = filename;
                    editor.setValue(currentProject.files[filename]);
                    const lang = filename.endsWith('.js') ? 'javascript' : filename.endsWith('.css') ? 'css' : filename.endsWith('.py') ? 'python' : 'html';
                    monaco.editor.setModelLanguage(editor.getModel(), lang);
                    renderFileTree();
                    renderTabs();
                };
                container.appendChild(div);
            });
        }

        function renderTabs() {
            const container = document.getElementById('tabsContainer');
            container.innerHTML = '';
            Object.keys(currentProject.files).forEach(filename => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (currentProject.currentFile === filename ? ' active' : '');
                tab.innerHTML = `${filename} <i class="fas fa-times" style="font-size: 10px;"></i>`;
                tab.onclick = (e) => {
                    if (e.target.classList.contains('fa-times')) {
                        delete currentProject.files[filename];
                        if (currentProject.currentFile === filename) {
                            currentProject.currentFile = Object.keys(currentProject.files)[0];
                            editor.setValue(currentProject.files[currentProject.currentFile]);
                        }
                        renderFileTree();
                        renderTabs();
                    } else {
                        currentProject.currentFile = filename;
                        editor.setValue(currentProject.files[filename]);
                        renderFileTree();
                        renderTabs();
                    }
                };
                container.appendChild(tab);
            });
        }

        function updatePreview() {
            const html = currentProject.files['index.html'] || '<h1>No index.html</h1>';
            const iframe = document.getElementById('preview-frame');
            iframe.srcdoc = html;
        }

        async function runCode() {
            const code = editor.getValue();
            const language = currentProject.currentFile.split('.').pop();
            terminal.writeln(`\r\n🚀 Executing ${currentProject.currentFile}...`);
            try {
                const res = await fetch('/api/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ code, language })
                });
                const data = await res.json();
                terminal.writeln(data.output || 'Execution completed.');
            } catch(err) {
                terminal.writeln('Execution failed: ' + err.message);
            }
            terminal.write('$ ');
        }

        async function saveProject() {
            try {
                await fetch('/api/projects/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ projectId: 'default', files: currentProject.files })
                });
                terminal.writeln('\r\n✓ Project saved');
            } catch(e) { console.error(e); }
        }

        async function loadProjects() {
            try {
                const res = await fetch('/api/projects/load', { headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` } });
                const data = await res.json();
                if (data.files) currentProject.files = data.files;
                renderFileTree();
                renderTabs();
                editor.setValue(currentProject.files[currentProject.currentFile]);
            } catch(e) {}
        }

        function autoSave() {
            clearTimeout(window.autoSaveTimeout);
            window.autoSaveTimeout = setTimeout(() => saveProject(), 2000);
        }

        function createNewFile() {
            const name = prompt('Enter filename (e.g., script.js):');
            if (name && !currentProject.files[name]) {
                currentProject.files[name] = '';
                renderFileTree();
                renderTabs();
                currentProject.currentFile = name;
                editor.setValue('');
            }
        }

        function connectCollaboration() {
            socket = io(WS_URL, { transports: ['websocket'], query: { token: localStorage.getItem('token') } });
            collaborationRoom = 'project_' + (currentUser?.username || 'default');
            socket.emit('join-room', collaborationRoom);
            socket.on('code-update', (data) => {
                if (data.file === currentProject.currentFile) {
                    currentProject.files[data.file] = data.content;
                    editor.setValue(data.content);
                }
            });
        }

        async function sendAIMessage() {
            const prompt = document.getElementById('aiPrompt').value;
            const model = document.getElementById('aiModel').value;
            if (!prompt) return;
            
            const messagesDiv = document.getElementById('aiMessages');
            messagesDiv.innerHTML += `<div class="ai-message user">${prompt}</div>`;
            document.getElementById('aiPrompt').value = '';
            
            try {
                const res = await fetch('/api/ai/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ prompt, model, context: editor.getValue() })
                });
                const data = await res.json();
                messagesDiv.innerHTML += `<div class="ai-message assistant">${data.reply}</div>`;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                
                if (data.generatedCode) {
                    if (confirm('AI generated code. Insert into editor?')) {
                        editor.setValue(data.generatedCode);
                    }
                }
            } catch(err) {
                messagesDiv.innerHTML += `<div class="ai-message assistant">Error: ${err.message}</div>`;
            }
        }

        async function deployProject() {
            terminal.writeln('\r\n🚀 Deploying to production...');
            try {
                const res = await fetch('/api/deploy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                    body: JSON.stringify({ files: currentProject.files })
                });
                const data = await res.json();
                terminal.writeln(`✅ Deployed! URL: ${data.url || 'https://wsendy-demo.vercel.app'}`);
            } catch(e) { terminal.writeln('Deploy failed'); }
        }

        function handleCommand(cmd) {
            const parts = cmd.trim().split(' ');
            switch(parts[0]) {
                case 'ls':
                    terminal.writeln(Object.keys(currentProject.files).join('  '));
                    break;
                case 'echo':
                    terminal.writeln(parts.slice(1).join(' '));
                    break;
                case 'clear':
                    terminal.clear();
                    break;
                default:
                    terminal.writeln(`Command not found: ${cmd}`);
            }
        }
    })();
</script>
